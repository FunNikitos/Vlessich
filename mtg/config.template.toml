# =============================================================================
# Vlessich — mtg per-user secret config TEMPLATE (Stage 9)
# =============================================================================
# This file is rendered per port by:
#   * Ansible (roles/node/tasks/mtg_per_user.yml) using Jinja2, OR
#   * mtg/render_pool.py (consumes /admin/mtproto/pool/config JSON dump)
#
# Placeholders (Jinja2 syntax):
#   {{ secret }}  — full ee-prefixed mtg secret (ee + 32hex + hex(cloak))
#   {{ port }}    — bind port for this container (e.g. 8443..84XX)
#
# DO NOT edit per-user configs by hand — regenerate from the pool dump
# whenever you bootstrap / rotate / revoke entries. Source-of-truth is
# the API DB (mtproto_secrets, scope='user').
# =============================================================================

secret = "{{ secret }}"
bind-to = "0.0.0.0:{{ port }}"
concurrency = 4096

[network]
prefer-ip = "prefer-ipv4"

[network.timeout]
tcp  = "5s"
http = "10s"
idle = "1m"

[defense.anti-replay]
enabled    = true
max-size   = "1mb"
error-rate = 0.001

[defense.block-list]
enabled = true
urls = [
  "https://lists.blocklist.de/lists/all.txt",
  "https://www.spamhaus.org/drop/drop.txt",
]
update-each = "6h"
download-concurrency = 2

[stats.prometheus]
enabled   = true
# Each container exposes /metrics on 127.0.0.1:{port+1000} so Prometheus
# can scrape them all without collisions. Override at render time if
# you want a different scheme.
bind-to   = "127.0.0.1:{{ port + 1000 }}"
http-path = "/metrics"

debug   = false
verbose = false

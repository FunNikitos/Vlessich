# =============================================================================
# Vlessich — MTProto-прокси (mtg) конфигурация
# =============================================================================
# Документация: https://github.com/9seconds/mtg
# Генерация secret: docker run --rm nineseconds/mtg:2 generate-secret <cloak-host>
# =============================================================================

# Секрет MTProto (формат EE...). ROTATE раз в 30 дней или при подозрении на утечку.
# Cloak-домен внутри секрета определяет Fake-TLS прикрытие.
secret = "ee367a189bef60a91e1cccdfc7d31eb27777772e6d6963726f736f66742e636f6d"
# ↑ пример: ee + 32hex + hex(www.microsoft.com) — генерируется командой выше

# Bind: слушаем все интерфейсы. nftables разрешает только :8443/tcp снаружи.
bind-to = "0.0.0.0:8443"

# Concurrency: ~10K одновременных соединений на 1 vCPU. На 4-vCPU смело 8192–16384.
concurrency = 8192

# -----------------------------------------------------------------------------
# Network — preferIPv4 (большинство РФ-юзеров на v4-only)
# -----------------------------------------------------------------------------

[network]
prefer-ip = "prefer-ipv4"
# Доп. proxy-режим (если выходим в интернет через другую ноду — не наш кейс)
# proxy = "http://..."

# Таймауты
[network.timeout]
tcp     = "5s"
http    = "10s"
idle    = "1m"

# -----------------------------------------------------------------------------
# Defense — anti-replay (защита от replay-атак ТСПУ для детекции прокси)
# -----------------------------------------------------------------------------

[defense.anti-replay]
enabled        = true
max-size       = "1mb"
error-rate     = 0.001

# -----------------------------------------------------------------------------
# Defense — allow-list / block-list
# -----------------------------------------------------------------------------

[defense.allow-list]
enabled = false
# urls = ["https://example.com/allowed-ips.txt"]
# update-each = "1h"

[defense.block-list]
enabled = true
# Блокируем известные IP сканеров и публичные списки прокси-сканеров
urls = [
  "https://lists.blocklist.de/lists/all.txt",
  "https://www.spamhaus.org/drop/drop.txt",
]
update-each = "6h"
download-concurrency = 2

# -----------------------------------------------------------------------------
# Stats — Prometheus метрики (доступны только с localhost)
# -----------------------------------------------------------------------------

[stats.prometheus]
enabled = true
bind-to = "127.0.0.1:9410"
http-path = "/metrics"

# -----------------------------------------------------------------------------
# Replicas — для PER-USER режима (см. TZ §9A.4 Решение 2)
# -----------------------------------------------------------------------------
# В MVP не используем (один shared secret выше). Когда переключимся на per-user:
#
# [replicas]
# enabled = true
# secrets = ["ee...user1...", "ee...user2..."]
#
# Альтернатива: запускать N контейнеров mtg на разных портах,
# каждому свой secret, маппить юзеров в БД (mtproto_secrets.scope='user').

# -----------------------------------------------------------------------------
# Sponsored channel — TG-канал, показывается у юзеров в списке каналов.
# Опционально, для маркетинга своего канала через прокси.
# -----------------------------------------------------------------------------
# Документация: https://core.telegram.org/api/sponsored-messages
# В mtg v2 это настраивается через @MTProxybot, не здесь.

# -----------------------------------------------------------------------------
# Debug
# -----------------------------------------------------------------------------

debug = false
verbose = false

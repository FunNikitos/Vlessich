repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: "^(bot|api)/"
      - id: ruff-format
        files: "^(bot|api)/"

  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.1-beta
    hooks:
      - id: hadolint-docker

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args: ["--args=-no-color"]

  # Frontend hooks (TZ Этап 0: prettier + eslint + tsc).
  # Run locally via 'system' language — requires 'make frontend-install' once
  # to populate node_modules in webapp/ and admin/.
  - repo: local
    hooks:
      - id: frontend-prettier-webapp
        name: prettier check (webapp)
        entry: npm --prefix webapp run format:check --silent
        language: system
        pass_filenames: false
        files: '^webapp/.*\.(ts|tsx|css|json)$'

      - id: frontend-prettier-admin
        name: prettier check (admin)
        entry: npm --prefix admin run format:check --silent
        language: system
        pass_filenames: false
        files: '^admin/.*\.(ts|tsx|css|json)$'

      - id: frontend-eslint-webapp
        name: eslint (webapp)
        entry: npm --prefix webapp run lint --silent
        language: system
        pass_filenames: false
        files: '^webapp/.*\.(ts|tsx)$'

      - id: frontend-eslint-admin
        name: eslint (admin)
        entry: npm --prefix admin run lint --silent
        language: system
        pass_filenames: false
        files: '^admin/.*\.(ts|tsx)$'

      - id: frontend-typecheck-webapp
        name: tsc --noEmit (webapp)
        entry: npm --prefix webapp run typecheck --silent
        language: system
        pass_filenames: false
        files: '^webapp/.*\.(ts|tsx)$'

      - id: frontend-typecheck-admin
        name: tsc --noEmit (admin)
        entry: npm --prefix admin run typecheck --silent
        language: system
        pass_filenames: false
        files: '^admin/.*\.(ts|tsx)$'

---
# sysctl tuning: BBR, TCP/UDP buffers, file limits

- name: Apply sysctl settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-vlessich.conf
    reload: true
  loop: "{{ sysctl_settings | dict2items }}"

- name: Increase file descriptor limits
  ansible.builtin.copy:
    dest: /etc/security/limits.d/99-vlessich.conf
    content: |
      * soft nofile 1000000
      * hard nofile 1000000
      root soft nofile 1000000
      root hard nofile 1000000
    mode: "0644"

---
# Prometheus node_exporter + Promtail → Loki

- name: Install node_exporter
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
  when: prometheus_node_exporter_enabled

- name: Ensure node_exporter is running
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
  when: prometheus_node_exporter_enabled

- name: Install Promtail
  ansible.builtin.get_url:
    url: "https://github.com/grafana/loki/releases/latest/download/promtail-linux-amd64.zip"
    dest: /tmp/promtail.zip
    mode: "0644"
  when: promtail_enabled

- name: Unpack Promtail
  ansible.builtin.unarchive:
    src: /tmp/promtail.zip
    dest: /usr/local/bin/
    remote_src: true
    creates: /usr/local/bin/promtail-linux-amd64
  when: promtail_enabled

- name: Deploy Promtail config
  ansible.builtin.copy:
    dest: /etc/promtail.yml
    mode: "0644"
    content: |
      server:
        http_listen_port: 9080
        grpc_listen_port: 0
      positions:
        filename: /tmp/positions.yaml
      clients:
        - url: {{ loki_url }}
      scrape_configs:
        - job_name: xray
          static_configs:
            - targets: [localhost]
              labels:
                job: xray
                host: "{{ inventory_hostname }}"
                __path__: /var/log/xray/*.log
        - job_name: caddy
          static_configs:
            - targets: [localhost]
              labels:
                job: caddy
                host: "{{ inventory_hostname }}"
                __path__: /var/log/caddy/*.log
        - job_name: syslog
          static_configs:
            - targets: [localhost]
              labels:
                job: syslog
                host: "{{ inventory_hostname }}"
                __path__: /var/log/syslog
  when: promtail_enabled

- name: Create Promtail systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/promtail.service
    content: |
      [Unit]
      Description=Promtail (Loki agent)
      After=network.target
      [Service]
      ExecStart=/usr/local/bin/promtail-linux-amd64 -config.file=/etc/promtail.yml
      Restart=always
      [Install]
      WantedBy=multi-user.target
    mode: "0644"
  when: promtail_enabled

- name: Enable Promtail
  ansible.builtin.systemd:
    name: promtail
    state: started
    enabled: true
    daemon_reload: true
  when: promtail_enabled

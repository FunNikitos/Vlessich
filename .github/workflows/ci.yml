name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (${{ matrix.module }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        module: [bot, api]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy app
      - name: Pytest
        env:
          BOT_TOKEN: "123:test"
          BOT_API_BASE_URL: "http://api:8000"
          BOT_API_INTERNAL_SECRET: "x_for_tests_______________________"
          API_INTERNAL_SECRET: "x_for_tests_______________________"
          API_SECRETBOX_KEY: "a_for_tests_______________________________________"
        run: pytest

  node:
    name: Node (${{ matrix.module }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        module: [webapp, admin]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.module }}/package.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  terraform:
    name: Terraform fmt+validate
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate

  ansible:
    name: Ansible lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ansible-core ansible-lint
      - run: ansible-lint ansible/

  shell:
    name: Shell + YAML lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        run: |
          pip install yamllint
          yamllint -s .
        continue-on-error: true

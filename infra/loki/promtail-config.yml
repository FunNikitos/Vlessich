# Promtail — ships structlog JSON logs from Vlessich services to Loki.
#
# Discovers containers via Docker socket. Parses the JSON body and
# promotes ``level`` to a Loki label so operators can quickly filter
# warnings / errors. ``service`` comes from the docker-compose service
# label (``com.docker.compose.service``). ``env`` is injected via the
# static ``external_labels`` below — override when deploying.
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    external_labels:
      env: dev
      cluster: vlessich

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
    relabel_configs:
      # Only ship logs from our compose project (safety).
      - source_labels: ["__meta_docker_container_label_com_docker_compose_project"]
        regex: "vlessich.*"
        action: keep
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            event: event
      - labels:
          level:
          logger:
      # Drop debug lines from non-api services to keep volume down.
      - match:
          selector: '{level="debug", service!="api"}'
          action: drop
      - output:
          source: event
